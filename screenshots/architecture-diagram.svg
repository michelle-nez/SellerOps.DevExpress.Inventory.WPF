<svg viewBox="0 0 660 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">MVVM + data architecture of the SellerOps Inventory app</title>
<desc id="desc">Four stacked layers: View (MainWindow.xaml) bound to ViewModel (MainViewModel.cs), which reads/writes through Data (InventoryDbContext.cs) backed by a SQLite Database. RelayCommand.cs and ViewModelBase.cs sit beside the ViewModel as supporting infrastructure; Product.cs sits beside the Data layer as the shared model/entity used by both the ViewModel and EF Core.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="660" height="420" fill="#ffffff"/>

<g>
  <rect x="170" y="20" width="260" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="300" y="48" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#042C53">View</text>
  <text x="300" y="66" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0C447C">MainWindow.xaml</text>
</g>

<line x1="300" y1="84" x2="300" y2="124" stroke="#444441" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<g>
  <rect x="170" y="124" width="260" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="300" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">ViewModel</text>
  <text x="300" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#085041">MainViewModel.cs</text>
</g>

<line x1="300" y1="188" x2="300" y2="228" stroke="#444441" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<g>
  <rect x="170" y="228" width="260" height="64" rx="8" fill="#EFE7FB" stroke="#5B2D91" stroke-width="0.5"/>
  <text x="300" y="256" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#2E1652">Data</text>
  <text x="300" y="274" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#4B2680">InventoryDbContext.cs (EF Core)</text>
</g>

<line x1="300" y1="292" x2="300" y2="332" stroke="#444441" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<g>
  <rect x="170" y="332" width="260" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="300" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Database</text>
  <text x="300" y="378" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#712B13">SQLite (inventory.db)</text>
</g>

<path d="M460 137 L430 140" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>
<g>
  <rect x="460" y="115" width="170" height="45" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="545" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">RelayCommand.cs</text>
  <text x="545" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#444441">wires up buttons</text>
</g>

<path d="M460 192 L430 185" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>
<g>
  <rect x="460" y="170" width="170" height="45" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="545" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">ViewModelBase.cs</text>
  <text x="545" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#444441">notifies of changes</text>
</g>

<path d="M460 250 L430 258" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>
<g>
  <rect x="460" y="228" width="170" height="45" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="545" y="246" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Product.cs</text>
  <text x="545" y="263" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#444441">shared model + EF Core entity</text>
</g>
</svg>
