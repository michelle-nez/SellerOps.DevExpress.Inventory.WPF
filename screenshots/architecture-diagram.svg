<svg viewBox="0 0 660 336" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">MVVM architecture of the SellerOps Inventory app</title>
<desc id="desc">Three stacked layers: View (MainWindow.xaml) bound to ViewModel (MainViewModel.cs) bound to Model (Product.cs). RelayCommand.cs and ViewModelBase.cs sit beside the ViewModel as supporting infrastructure.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="660" height="336" fill="#ffffff"/>

<g>
  <rect x="170" y="20" width="260" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="300" y="48" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#042C53">View</text>
  <text x="300" y="66" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0C447C">MainWindow.xaml</text>
</g>

<line x1="300" y1="84" x2="300" y2="134" stroke="#444441" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<g>
  <rect x="170" y="134" width="260" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="300" y="162" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">ViewModel</text>
  <text x="300" y="180" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#085041">MainViewModel.cs</text>
</g>

<line x1="300" y1="198" x2="300" y2="248" stroke="#444441" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<g>
  <rect x="170" y="248" width="260" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="300" y="276" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Model</text>
  <text x="300" y="294" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#712B13">Product.cs</text>
</g>

<path d="M460 137 L430 140" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>
<g>
  <rect x="460" y="115" width="170" height="45" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="545" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">RelayCommand.cs</text>
  <text x="545" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#444441">wires up buttons</text>
</g>

<path d="M460 192 L430 185" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>
<g>
  <rect x="460" y="170" width="170" height="45" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="545" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">ViewModelBase.cs</text>
  <text x="545" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#444441">notifies of changes</text>
</g>
</svg>
